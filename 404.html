<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Page Not Found | WAPARCEL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--dark); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    .notfound-content h1 { font-family: var(--font-head); font-size: 8rem; font-weight: 900; color: var(--yellow); line-height: 1; }
    .notfound-content h2 { font-family: var(--font-head); font-size: 2rem; font-weight: 700; margin: 16px 0; }
    .notfound-content p { color: rgba(255,255,255,0.7); margin-bottom: 36px; }
  </style>
</head>
<body>
  <div class="notfound-content">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="index.html" class="btn btn-primary">← Back to Home</a>
  </div>
</body>
</html>
